<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito - Tienda Sara</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">
<i class="bi bi-cart-fill"></i> Tienda Sara
</a>

<div class="navbar-nav ms-auto">

<a class="nav-link" href="index.html">Inicio</a>
<a class="nav-link" href="productos.html">Productos</a>
<a class="nav-link active" href="carrito.html">Carrito</a>

</div>

</div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

<h2 class="mb-4">Carrito de Compras</h2>

<div class="table-responsive">

<table class="table table-bordered text-center">

<thead class="table-dark">

<tr>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>
</tr>

</thead>

<tbody>

<tr>
<td>Laptop HP</td>
<td>$15,000</td>
<td>
<input type="number" id="cant1" value="1" min="1"
class="form-control" onchange="actualizarTotal()">
</td>
<td>$15,000</td>
</tr>

<tr>
<td>Audífonos Bluetooth</td>
<td>$1,200</td>
<td>
<input type="number" id="cant2" value="1" min="1"
class="form-control" onchange="actualizarTotal()">
</td>
<td>$1,200</td>
</tr>

</tbody>

</table>

</div>

<!-- RESUMEN -->
<div class="row mt-4">

<div class="col-md-6">

<div class="card shadow p-3">

<h5>Cupón de descuento</h5>

<div class="input-group">

<input type="text" id="cupon" class="form-control" placeholder="SARA10">

<button class="btn btn-primary" onclick="aplicarCupon()">
Aplicar
</button>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card shadow p-3 resumen">

<h4>Resumen del pedido</h4>

<p>Subtotal: $16,200</p>
<p>IVA: $2,592</p>

<hr>

<h3 id="total">$16,200</h3>

<button class="btn btn-success w-100 mb-2">
<i class="bi bi-credit-card-fill"></i> Proceder al pago
</button>

<a href="productos.html" class="btn btn-outline-secondary w-100">
<i class="bi bi-arrow-left"></i> Seguir comprando
</a>

</div>

</div>

</div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4 mt-5">

<p>Tienda Sara © 2025</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>
</html>
