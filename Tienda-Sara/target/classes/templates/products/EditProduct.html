<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Best Store - Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-8 mx-auto rounded border p-4 m-4 shadow-sm">
          <h2 class="text-center mb-5">Edit Product</h2>
          
          <form method="post" enctype="multipart/form-data" th:object="${productDto}">
            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">ID</label>
                <div class="col-sm-8">
                    <input readonly class="form-control-plaintext fw-bold" th:value="${product.id}">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Description</label>
                <div class="col-sm-8">
                    <textarea class="form-control" th:field="*{description}"></textarea>
                    <p th:if="${#fields.hasErrors('description')}" th:errorclass="text-danger" th:errors="*{description}"></p>
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Price</label>
                <div class="col-sm-8">
                    <input class="form-control" type="number" step="0.01" min="0" th:field="*{price}">
                    <p th:if="${#fields.hasErrors('price')}" th:errorclass="text-danger" th:errors="*{price}"></p>
                </div>
            </div>
                
            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Amount</label>
                <div class="col-sm-8">
                    <input class="form-control" type="number" min="0" th:field="*{amount}">
                    <p th:if="${#fields.hasErrors('amount')}" th:errorclass="text-danger" th:errors="*{amount}"></p>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Category</label>
                <div class="col-sm-8">
                  <select class="form-select" th:field="*{category}">
                    <option value="">Elige la Categoria</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.description}"></option>
                  </select>
                  <p th:if="${#fields.hasErrors('category')}" th:errorclass="text-danger" th:errors="*{category}"></p>
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Mark</label>
                <div class="col-sm-8">
                  <select class="form-select" th:field="*{mark}">
                    <option value="">Elige la Marca</option>
                    <option th:each="mark : ${marks}" th:value="${mark.id}" th:text="${mark.description}"></option>
                  </select>
                  <p th:if="${#fields.hasErrors('mark')}" th:errorclass="text-danger" th:errors="*{mark}"></p>
                </div>
            </div>

            <div class="row mb-3">
                <div class="offset-sm-4 col-sm-8">
                    <img th:src="@{'/images/' + ${product.imageFileName}}" alt="Current image" width="150" class="img-thumbnail d-block mb-2">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Image</label>
                <div class="col-sm-8">
                    <input class="form-control" type="file" th:field="*{imageFile}">
                    <p th:if="${#fields.hasErrors('imageFile')}" th:errorclass="text-danger" th:errors="*{imageFile}"></p>
                </div>
            </div>
                
            <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Created At</label>
                <div class="col-sm-8">
                  <input readonly class="form-control-plaintext" th:value="${#dates.format(product.createdAt, 'yyyy-MM-dd HH:mm:ss')}">
                </div>
            </div>

            <div class="row">
              <div class="offset-sm-4 col-sm-4 d-grid">
                  <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
              <div class="col-sm-4 d-grid">
                  <a class="btn btn-outline-primary" href="/products" role="button">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
